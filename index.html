<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0f" />
    <script>
      (function () {
        var k = "resume-theme";
        var s = localStorage.getItem(k);
        var t = s === "light" || s === "dark" ? s : "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <meta name="apple-mobile-web-app-title" content="SM" />
    <meta name="application-name" content="SM" />
    <meta property="og:title" content="SM" />
    <meta name="twitter:title" content="SM" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>SM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
